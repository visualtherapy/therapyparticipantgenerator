<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participant Link Generator — Cikgu Mata</title>
<style>
  :root {
    --bg: #03050a; --surface: #080d18; --surface2: #0d1526;
    --border: #1a2540; --green: #00ff88; --text: #c8d8f0;
    --text-muted: #4a6080; --red: #ff2244; --yellow: #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
  h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.05em; color: var(--green); margin-bottom: 4px; }
  .sub { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 620px; padding: 24px; margin-bottom: 16px; }
  label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 0.95rem; outline: none; margin-bottom: 14px; }
  input:focus, select:focus { border-color: var(--green); }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  .btn-green { background: var(--green); color: #000; }
  .btn-copy { background: var(--surface2); border: 1px solid var(--border); color: var(--green); font-size: 0.75rem; padding: 5px 10px; width: auto; border-radius: 6px; }
  .btn-export { background: var(--surface2); border: 1px solid var(--green); color: var(--green); margin-top: 10px; }
  #results { display: none; }
  .link-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 10px; }
  .link-table th { text-align: left; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .link-table td { padding: 8px 10px; border-bottom: 1px solid #0d1526; vertical-align: middle; }
  .link-table tr:last-child td { border-bottom: none; }
  .link-cell { color: var(--green); font-family: monospace; font-size: 0.78rem; word-break: break-all; }
  .pid-badge { display: inline-block; background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.3); border-radius: 5px; padding: 2px 8px; font-family: monospace; font-size: 0.85rem; color: var(--green); }
  .copy-all-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-wrap: wrap; gap: 8px; }
  .stat { font-size: 0.8rem; color: var(--text-muted); }
  .stat span { color: var(--green); font-weight: 700; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 22px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .scroll-box { max-height: 400px; overflow-y: auto; }
  .scroll-box::-webkit-scrollbar { width: 5px; }
  .scroll-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<h1>🔗 Participant Link Generator</h1>
<p class="sub">Generate unique prefilled links for each participant — Cikgu Mata Vision Therapy</p>

<div class="card">
  <div class="section-title">Configuration</div>
  <div class="row">
    <div>
      <label>Prefix (e.g. P, PT, S)</label>
      <input type="text" id="prefix" value="P" maxlength="5" placeholder="P">
    </div>
    <div>
      <label>Start Number</label>
      <input type="number" id="startNum" value="1" min="1" max="999">
    </div>
    <div>
      <label>End Number</label>
      <input type="number" id="endNum" value="20" min="1" max="999">
    </div>
  </div>
  <div class="row">
    <div>
      <label>Pad digits (e.g. 2 → P01, 3 → P001)</label>
      <select id="padDigits">
        <option value="1">1 digit (P1)</option>
        <option value="2" selected>2 digits (P01)</option>
        <option value="3">3 digits (P001)</option>
      </select>
    </div>
    <div>
      <label>Base URL (your GitHub Pages)</label>
      <input type="text" id="baseUrl" value="https://visualtherapy.github.io/dt/" placeholder="https://...">
    </div>
  </div>
  <button class="btn-green" onclick="generate()">⚡ Generate Links</button>
</div>

<div class="card" id="results">
  <div class="section-title">Generated Links</div>
  <div class="copy-all-row">
    <div class="stat">Total: <span id="totalCount">0</span> links</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-copy" onclick="copyAll()">📋 Copy All Links</button>
      <button class="btn-copy" onclick="exportCSV()">⬇️ Export CSV</button>
    </div>
  </div>
  <div class="scroll-box" style="margin-top:12px;">
    <table class="link-table">
      <thead>
        <tr>
          <th>Participant ID</th>
          <th>Link</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="linkTableBody"></tbody>
    </table>
  </div>
</div>

<div id="toast" class="toast">✅ Copied!</div>

<script>
let generated = [];

function pad(num, digits) {
  return String(num).padStart(digits, '0');
}

function generate() {
  const prefix = document.getElementById('prefix').value.trim().toUpperCase() || 'P';
  const start = parseInt(document.getElementById('startNum').value) || 1;
  const end = parseInt(document.getElementById('endNum').value) || 20;
  const digits = parseInt(document.getElementById('padDigits').value) || 2;
  let base = document.getElementById('baseUrl').value.trim();
  if (!base.endsWith('/') && !base.includes('?')) base += '/';
  if (!base.includes('?') && !base.endsWith('/')) base += '/';

  if (end < start) { alert('End number must be >= start number'); return; }
  if (end - start > 199) { alert('Maximum 200 links at once'); return; }

  generated = [];
  for (let i = start; i <= end; i++) {
    const pid = prefix + pad(i, digits);
    const url = base + '?pid=' + pid;
    generated.push({ pid, url });
  }

  renderTable();
  document.getElementById('totalCount').textContent = generated.length;
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderTable() {
  const tbody = document.getElementById('linkTableBody');
  tbody.innerHTML = generated.map(({ pid, url }) => `
    <tr>
      <td><span class="pid-badge">${pid}</span></td>
      <td class="link-cell"><a href="${url}" target="_blank" style="color:inherit;text-decoration:none;">${url}</a></td>
      <td><button class="btn-copy" onclick="copySingle('${url}', this)">Copy</button></td>
    </tr>
  `).join('');
}

function copySingle(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function copyAll() {
  const text = generated.map(g => g.pid + '\t' + g.url).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Copied ' + generated.length + ' links!'));
}

function exportCSV() {
  const rows = ['Participant ID,Link', ...generated.map(g => `${g.pid},${g.url}`)];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'participant_links.csv'; a.click();
  showToast('CSV downloaded!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✅ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
